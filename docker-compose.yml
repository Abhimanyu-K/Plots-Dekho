services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: plots-dekho-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: plotsdekho
      POSTGRES_PASSWORD: dev_password_123
      POSTGRES_DB: plotsdekho_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - plots-dekho-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plotsdekho"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: plots-dekho-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - plots-dekho-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Meilisearch
  meilisearch:
    image: getmeili/meilisearch:v1.5
    container_name: plots-dekho-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: dev_master_key_change_in_production
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - plots-dekho-network

  # pgAdmin (Optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: plots-dekho-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@plotsdekho.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - plots-dekho-network
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:

networks:
  plots-dekho-network:
    driver: bridge
